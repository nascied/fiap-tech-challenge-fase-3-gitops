name: Atualiza valores de infraestrutura

on:
  workflow_call:
    inputs:
      service:
        description: "Nome do serviço, igual ao nome da pasta em helm/ (ex: auth-service)"
        required: true
        type: string
      values_json:
        description: >
          JSON (objeto plano) com pares "caminho.no.values.yaml": "valor" a aplicar,
          ex: {"secret.DATABASE_URL": "postgres://...", "configMap.AWS_REGION": "us-east-1"}
        required: true
        type: string
    secrets:
      GITOPS_PUSH_TOKEN:
        description: "Token com permissão de push neste repositório (o job roda no contexto do repositório chamador)"
        required: true

jobs:
  update-values:
    name: Atualiza values.yaml
    runs-on: ubuntu-latest
    env:
      SERVICE: ${{ inputs.service }}
      VALUES_JSON: ${{ inputs.values_json }}
    steps:
      - name: Checkout do repositório GitOps
        uses: actions/checkout@v4
        with:
          repository: nascied/fiap-tech-challenge-fase-3-gitops
          ref: main
          token: ${{ secrets.GITOPS_PUSH_TOKEN }}

      - name: Valida se o chart do serviço existe
        run: |
          FILE="helm/${SERVICE}/values.yaml"
          test -f "$FILE" || { echo "Chart não encontrado: $FILE"; exit 1; }

      - name: Aplica cada par caminho=valor no values.yaml
        run: |
          FILE="helm/${SERVICE}/values.yaml"
          echo "$VALUES_JSON" | jq -c 'to_entries[]' | while IFS= read -r entry; do
            PATH_EXPR=$(jq -r '.key' <<<"$entry")
            export VQ_VALUE
            VQ_VALUE=$(jq -r '.value' <<<"$entry")
            yq -i ".${PATH_EXPR} = strenv(VQ_VALUE)" "$FILE"
          done

      - name: Commit e push
        run: |
          FILE="helm/${SERVICE}/values.yaml"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          if git diff --cached --quiet; then
            echo "Nenhuma mudança no values.yaml, pulando commit."
            exit 0
          fi
          git commit -m "chore: atualiza valores de infraestrutura do ${SERVICE}"
          success=false
          for i in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              success=true
              break
            fi
            echo "Tentativa $i de push falhou, tentando novamente em 5s..."
            sleep 5
          done
          if [ "$success" != "true" ]; then
            echo "Falha ao fazer push após 3 tentativas."
            exit 1
          fi
