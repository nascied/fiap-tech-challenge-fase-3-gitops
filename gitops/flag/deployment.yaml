apiVersion: apps/v1
kind: Deployment
metadata:
  name: flag-service
  namespace: fiap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flag-service
  template:
    metadata:
      labels:
        app: flag-service
    spec:
      containers:
        - name: flag-service
          image: flag-service:v1.0.0
          ports:
            - containerPort: 8080
