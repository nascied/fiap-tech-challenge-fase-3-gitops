apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: fiap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: analytics-service:v1.0.1
          ports:
            - containerPort: 8080
