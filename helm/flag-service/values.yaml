namespace: fiap-tc-f4
image:
  repository: 372515679553.dkr.ecr.us-east-1.amazonaws.com/fiap-tc-f4-flag-reg
  tag: flag-service-8a53a63
replicas: 1
port: 8002
resources:
  requests:
    cpu: 100m
    memory: 128Mi
