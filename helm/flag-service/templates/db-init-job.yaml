{{- if .Values.dbInit.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Chart.Name }}-db-init
  namespace: {{ .Values.namespace }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  template:
    metadata:
      name: {{ .Chart.Name }}-db-init
    spec:
      restartPolicy: Never
      containers:
        - name: db-init
          image: "{{ .Values.dbInit.image }}"
          command: ["sh", "-c"]
          args:
            - 'psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f /sql/init.sql'
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-secret
                  key: DATABASE_URL
          volumeMounts:
            - name: sql
              mountPath: /sql
      volumes:
        - name: sql
          configMap:
            name: {{ .Chart.Name }}-db-init
{{- end }}
