namespace: fiap-tc-f4
image:
  repository: 372515679553.dkr.ecr.us-east-1.amazonaws.com/fiap-tc-f4-auth-reg
  tag: auth-service-v1
replicas: 1
port: 8001
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
probe:
  path: /health
configMap:
  PORT: "8001"
secret:
  # Placeholder — substituído automaticamente pelo pipeline update-infra-values.yaml
  # a partir do output aws_db_instance_connection_strings do Terraform (fase3)
  DATABASE_URL: "postgresql://postgres:postgre123@auth-service.cx9tg3bfmnmh.us-east-1.rds.amazonaws.com:5432/auth_db"
  MASTER_KEY: "admin-secreto-123"
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  cpuUtilization: 70
  memoryUtilization: 80
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  path: /auth(/|$)(.*)
keda:
  enabled: false
dbInit:
  enabled: true
  image: postgres:16-alpine
