namespace: fiap-tc-f4
image:
  repository: 372515679553.dkr.ecr.us-east-1.amazonaws.com/fiap-tc-f4-analytics-reg
  tag: analytics-service-4ef7e8e
replicas: 1
port: 8005
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
probe:
  path: /health
configMap:
  # Endereço interno do cluster — fixo, não depende do Terraform
  AUTH_SERVICE_URL: "http://auth-service-svc:8001"
  PORT: "8005"
  # Substituídos automaticamente pelo update-infra-values.yaml a partir dos outputs
  # sqs_queue_url, aws_dynamodb_table_name do Terraform (fase3)
  AWS_SQS_URL: "https://sqs.us-east-1.amazonaws.com/372515679553/evaluation-events"
  AWS_DYNAMODB_TABLE: "ToggleMasterAnalytics"
  AWS_REGION: "us-east-1"
secret:
  # AWS_* substituídos automaticamente pelo update-infra-values.yaml, com as credenciais
  # AWS repassadas pelo fase3 no repository_dispatch (mesmas usadas no terraform apply)
  # SERVICE_API_KEY: NÃO é automático — só existe depois que o auth-service gera/valida
  # a chave em runtime. Preencher manualmente aqui após a aplicação estar no ar.
  SERVICE_API_KEY: "tm_key_2743deff552c19845f3ef40dc6d68cd329d9ff441e012d49cb1d667183625171"
  AWS_ACCESS_KEY_ID: "ASIAVNO5KFVAVYC52V4D"
  AWS_SECRET_ACCESS_KEY: "rx8Z/f7Bg1TBoTT6wgu+Le3gNGm2aeE9GIDQw7KC"
  AWS_SESSION_TOKEN: ""
# Escalonamento via KEDA (fila SQS), não via HPA de CPU/memória
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  cpuUtilization: 70
  memoryUtilization: 80
keda:
  enabled: true
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 0
  maxReplicaCount: 10
  # Substituídos automaticamente pelo update-infra-values.yaml (mesmos outputs do AWS_SQS_URL/AWS_REGION acima)
  queueURL: "https://sqs.us-east-1.amazonaws.com/372515679553/evaluation-events"
  awsRegion: "us-east-1"
  queueLength: "5"
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  path: /analytics(/|$)(.*)
