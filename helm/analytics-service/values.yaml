namespace: fiap-tc-f4

image:
  repository: 913901705985.dkr.ecr.us-east-1.amazonaws.com/fiap-tc-f4-reg
  tag: analytics-service-v1

replicas: 1

port: 8005

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

probe:
  path: /health

configMap:
  # Endereço interno do cluster — fixo, não depende do Terraform
  AUTH_SERVICE_URL: "http://auth-service-svc:8001"
  PORT: "8005"
  # Substituídos automaticamente pelo update-infra-values.yaml a partir dos outputs
  # sqs_queue_url, aws_dynamodb_table_name do Terraform (fase3)
  AWS_SQS_URL: "REPLACED_BY_INFRA_PIPELINE"
  AWS_DYNAMODB_TABLE: "REPLACED_BY_INFRA_PIPELINE"
  AWS_REGION: "REPLACED_BY_INFRA_PIPELINE"

secret:
  # AWS_* substituídos automaticamente pelo update-infra-values.yaml, com as credenciais
  # AWS repassadas pelo fase3 no repository_dispatch (mesmas usadas no terraform apply)
  # SERVICE_API_KEY: NÃO é automático — só existe depois que o auth-service gera/valida
  # a chave em runtime. Preencher manualmente aqui após a aplicação estar no ar.
  SERVICE_API_KEY: "SET_MANUALLY_AFTER_APP_IS_RUNNING"
  AWS_ACCESS_KEY_ID: "REPLACED_BY_INFRA_PIPELINE"
  AWS_SECRET_ACCESS_KEY: "REPLACED_BY_INFRA_PIPELINE"
  AWS_SESSION_TOKEN: "REPLACED_BY_INFRA_PIPELINE"

# Escalonamento via KEDA (fila SQS), não via HPA de CPU/memória
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  cpuUtilization: 70
  memoryUtilization: 80

keda:
  enabled: true
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 0
  maxReplicaCount: 10
  # Substituídos automaticamente pelo update-infra-values.yaml (mesmos outputs do AWS_SQS_URL/AWS_REGION acima)
  queueURL: "REPLACED_BY_INFRA_PIPELINE"
  awsRegion: "REPLACED_BY_INFRA_PIPELINE"
  queueLength: "5"

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  path: /analytics(/|$)(.*)
