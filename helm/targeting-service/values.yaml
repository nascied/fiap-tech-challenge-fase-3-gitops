namespace: fiap-tc-f4
image:
  repository: 372515679553.dkr.ecr.us-east-1.amazonaws.com/fiap-tc-f4-targeting-reg
  tag: targeting-service-v1
replicas: 1
port: 8003
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
probe:
  path: /health
configMap:
  AUTH_SERVICE_URL: "http://auth-service-svc:8001"
  PORT: "8003"
secret:
  # Placeholder — substituído automaticamente pelo pipeline update-infra-values.yaml
  # a partir do output aws_db_instance_connection_strings do Terraform (fase3)
  DATABASE_URL: "postgresql://postgres:postgre123@targeting-service.cx9tg3bfmnmh.us-east-1.rds.amazonaws.com:5432/targeting_db"
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  cpuUtilization: 70
  memoryUtilization: 80
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  path: /targeting(/|$)(.*)
keda:
  enabled: false
dbInit:
  enabled: true
  image: postgres:16-alpine
